name: Test CWB

on:
  pull_request:
    branches:
      - staging
      - main
    paths:
      - 'cwb'
      - 'scripts/cwb/**'
      - '.github/workflows/test-cwb.yml'
  push:
    branches:
      - staging
      - main
    paths:
      - 'cwb'
      - 'scripts/cwb/**'
      - '.github/workflows/test-cwb.yml'

concurrency:
  group: test-cwb-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test-cwb:
    name: test-cwb
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout trusted test harness from staging
        uses: actions/checkout@v4
        with:
          ref: staging
          path: trusted

      - name: Checkout candidate (pull request)
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          path: candidate

      - name: Checkout candidate (push)
        if: github.event_name == 'push'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          path: candidate

      - name: Install dependencies
        run: sudo apt-get install -y zsh

      - name: Run cwb bash tests
        run: |
          CWB_SOURCE_ROOT="$GITHUB_WORKSPACE/candidate" \
            bash candidate/scripts/cwb/test_cwb.sh
